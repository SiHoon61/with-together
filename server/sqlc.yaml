version: "2"
sql:
  - engine: postgresql
    schema:
      - "db/migrations/*.up.sql"
    queries:
      - "db/queries/*.sql"
    gen:
      go:
        package: "sqlcstore"
        out: "internal/store/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_result_struct_pointers: true
        emit_interface: true
